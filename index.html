<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aiko AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root[data-theme="dark"] {
    --bg: #0B0A12;
    --surface: #1D1B2A;
    --surface2: #16141F;
    --surface3: #1B1926;
    --text: #F4F1F8;
    --muted: #9A94AB;
    --muted2: #6E6884;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.06);
    --hover: rgba(255,255,255,0.07);
    --accent1: #8B7CF6;
    --accent2: #5B4FCF;
    --hero-glow: radial-gradient(ellipse 70% 55% at 50% 38%, #4B3FA0 0%, #241C4E 38%, #0B0A12 72%);
  }
  :root[data-theme="light"] {
    --bg: #F3F1FA;
    --surface: #FFFFFF;
    --surface2: #FFFFFF;
    --surface3: #FFFFFF;
    --text: #211E2C;
    --muted: #6B6580;
    --muted2: #8A84A0;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.06);
    --hover: rgba(0,0,0,0.05);
    --accent1: #8B7CF6;
    --accent2: #5B4FCF;
    --hero-glow: radial-gradient(ellipse 70% 55% at 50% 38%, #C9C0F5 0%, #E6E1FA 38%, #F3F1FA 72%);
  }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; }

  /* ---------- HEADER ---------- */
  #app-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    z-index: 5;
  }
  .menu-icon { font-size: 20px; color: var(--muted); cursor: pointer; }
  #header-avatar-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; overflow: hidden; cursor: pointer; flex-shrink: 0;
  }
  #header-avatar-btn img, #header-avatar-btn video { width: 100%; height: 100%; object-fit: cover; }
  .title { font-size: 18px; font-weight: 600; color: var(--text); }
  #home-btn { margin-left: auto; font-size: 18px; color: var(--muted); cursor: pointer; display: none; }

  /* ---------- HERO ---------- */
  #hero {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 24px 0; position: relative; background: var(--hero-glow); overflow: hidden;
  }
  #hero::before, #hero::after {
    content: ""; position: absolute; width: 280px; height: 280px; border-radius: 50%;
    filter: blur(70px); opacity: 0.45; z-index: 0; pointer-events: none;
  }
  #hero::before { background: var(--accent1); top: -90px; left: -70px; animation: floatBlob1 13s ease-in-out infinite; }
  #hero::after { background: var(--accent2); bottom: -90px; right: -70px; animation: floatBlob2 16s ease-in-out infinite; }
  @keyframes floatBlob1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(50px, 35px) scale(1.2); }
  }
  @keyframes floatBlob2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-40px, -45px) scale(1.15); }
  }
  #hero > * { position: relative; z-index: 1; }

  #hero-icon-ring {
    width: 148px; height: 148px; border-radius: 38px; padding: 4px;
    background: conic-gradient(from 0deg, var(--accent1), #E08E6D, var(--accent2), var(--accent1));
    animation: ringFloat 3s ease-in-out infinite, ringPulse 3.2s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; cursor: pointer;
  }
  @keyframes ringFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
  #hero-icon {
    width: 100%; height: 100%; border-radius: 34px; background: var(--bg);
    display: flex; align-items: center; justify-content: center; font-size: 56px;
    overflow: hidden;
  }
  #hero-icon img, #hero-icon video { width: 100%; height: 100%; object-fit: cover; }
  #hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  #hero p.tagline { color: var(--muted); font-size: 14.5px; margin-top: 6px; text-align: center; }

  #topic-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 36px; }
  .chip {
    display: flex; align-items: center; gap: 7px;
    background: var(--hover); border: 1px solid var(--border);
    color: var(--text); padding: 9px 16px; border-radius: 999px; font-size: 14px; cursor: pointer;
  }
  .chip:active { background: var(--border); }

  /* ---------- CHAT VIEW ---------- */
  #chat-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 14px 6px; display: flex; flex-direction: column; gap: 4px; }
  .msg-block { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
  .msg-row { max-width: 84%; display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.assistant { align-self: flex-start; }
  .msg-avatar {
    width: 26px; height: 26px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    flex-shrink: 0; overflow: hidden;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.55; white-space: pre-wrap;
  }
  .msg-bubble.assistant { background: var(--surface); border: 1px solid var(--border2); border-bottom-left-radius: 4px; }
  .msg-bubble.user {
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; border-bottom-right-radius: 4px;
  }
  .msg-edit-textarea {
    font: inherit; padding: 10px 14px; border-radius: 16px; border: 1px solid var(--accent1);
    background: var(--surface); color: var(--text); resize: none; width: 100%; max-width: 260px;
  }
  .msg-actions { display: flex; gap: 12px; padding: 0 4px; }
  .msg-row.assistant + .msg-actions { padding-left: 34px; }
  .msg-row.user ~ .msg-actions { justify-content: flex-end; padding-right: 34px; }
  .msg-action-btn {
    background: none; border: none; color: var(--muted2); font-size: 12px; cursor: pointer; opacity: 0.85;
    padding: 2px 4px;
  }
  .msg-action-btn.copied { color: #6FCF97; }

  #typing-indicator { display: none; align-self: flex-start; gap: 8px; align-items: center; padding: 0 16px 8px; }
  #typing-indicator.show { display: flex; }
  .typing-dots { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border2); padding: 12px 14px; border-radius: 16px; border-bottom-left-radius: 4px; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); animation: blink 1.3s infinite both; }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .2; } 40% { opacity: 1; } }

  /* ---------- INPUT BAR ---------- */
  #input-bar {
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent 0%, var(--bg) 35%);
    position: relative; z-index: 5;
  }
  #input-wrap {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface3); border: 1px solid var(--border); border-radius: 26px; padding: 6px 6px 6px 8px;
  }
  #mic-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent;
    color: var(--muted); font-size: 16px; flex-shrink: 0; cursor: pointer;
  }
  #mic-btn.listening { background: #E14D4D; color: #fff; }
  #message-input {
    flex: 1; background: transparent; border: none; outline: none; color: var(--text);
    font-size: 15px; font-family: inherit; resize: none; max-height: 100px; padding: 8px 0;
  }
  #message-input::placeholder { color: var(--muted2); }
  #send-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--surface);
    color: var(--muted2); font-size: 16px; flex-shrink: 0; cursor: not-allowed; transition: background .15s, color .15s;
  }
  #send-btn.enabled { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; cursor: pointer; }

  /* ---------- SIDEBAR ---------- */
  #sidebar-overlay, #profile-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 20;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  #sidebar-overlay.open, #profile-overlay.open { opacity: 1; pointer-events: auto; }
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 80%; max-width: 300px;
    background: var(--surface2); z-index: 21; display: flex; flex-direction: column;
    transform: translateX(-100%); transition: transform .22s ease; border-right: 1px solid var(--border2);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-header { padding: 16px 14px 10px; }
  #new-chat-btn {
    width: 100%; display: flex; align-items: center; gap: 8px; background: var(--hover);
    border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 12px;
    font-size: 14.5px; cursor: pointer;
  }
  #sidebar-list { flex: 1; overflow-y: auto; padding: 4px 10px 10px; display: flex; flex-direction: column; gap: 2px; }
  .conv-item { display: flex; align-items: center; gap: 6px; padding: 10px; border-radius: 10px; cursor: pointer; color: var(--muted); font-size: 13.5px; }
  .conv-item:hover, .conv-item.active { background: var(--hover); color: var(--text); }
  .conv-item .conv-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .conv-item .conv-title-input {
    flex: 1; background: var(--surface); border: 1px solid var(--accent1); color: var(--text);
    border-radius: 6px; padding: 3px 6px; font-size: 13px; font-family: inherit;
  }
  .conv-item button { background: none; border: none; color: var(--muted2); font-size: 13px; cursor: pointer; padding: 3px 4px; flex-shrink: 0; }
  .conv-empty { color: var(--muted2); font-size: 13px; padding: 12px 10px; }
  #sidebar-footer { display: flex; gap: 8px; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border2); }
  #sidebar-footer button {
    flex: 1; background: var(--hover); border: 1px solid var(--border); color: var(--muted);
    padding: 9px; border-radius: 10px; font-size: 12.5px; cursor: pointer;
  }

  /* ---------- PROFILE PANEL ---------- */
  #profile-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 88%; max-width: 380px;
    background: var(--surface2); z-index: 21; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .22s ease; border-left: 1px solid var(--border2);
    overflow-y: auto;
  }
  #profile-panel.open { transform: translateX(0); }
  .profile-header { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid var(--border2); }
  .profile-header button { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .profile-header span { font-weight: 600; font-size: 16px; }
  .profile-body { padding: 20px 18px 40px; display: flex; flex-direction: column; gap: 4px; }

  #profile-avatar-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
  #profile-avatar {
    width: 92px; height: 92px; border-radius: 26px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 42px;
    overflow: hidden; cursor: pointer; margin-bottom: 10px;
  }
  #profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  #profile-avatar-edit-label { color: var(--accent1); font-size: 13px; cursor: pointer; }

  .field-label { color: var(--muted); font-size: 12px; font-weight: 600; display: block; margin: 14px 0 6px; }
  #profile-name-input, #profile-personality-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; color: var(--text); font-size: 14px; font-family: inherit; outline: none;
  }
  #profile-personality-input { resize: none; }

  #personality-presets { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; margin-bottom: 4px; }
  .preset-btn {
    background: var(--hover); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
  }

  #gallery-slots { display: flex; gap: 10px; margin-top: 8px; }
  .gallery-slot {
    width: 72px; height: 72px; border-radius: 14px; background: var(--surface);
    border: 1.5px dashed var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--muted2); cursor: pointer; position: relative; overflow: hidden;
  }
  .gallery-slot img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-slot .slot-remove {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; display: flex; align-items: center;
    justify-content: center; border: none; cursor: pointer;
  }
  .gallery-hint { color: var(--muted2); font-size: 11.5px; margin-top: 6px; }

  #theme-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider {
    position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 24px; transition: .2s;
  }
  .switch-slider::before {
    content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .switch-slider { background: var(--accent1); }
  .switch input:checked + .switch-slider::before { transform: translateX(20px); }

  #save-profile-btn {
    margin-top: 24px; width: 100%; padding: 12px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff;
    font-weight: 600; font-size: 14.5px; cursor: pointer;
  }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- ===== PROFILE PANEL ===== -->
<div id="profile-overlay"></div>
<div id="profile-panel">
  <div class="profile-header">
    <button id="profile-close">✕</button>
    <span>Profil</span>
  </div>
  <div class="profile-body">
    <div id="profile-avatar-wrap">
      <div id="profile-avatar"><span id="profile-avatar-emoji">🤖</span></div>
      <span id="profile-avatar-edit-label">Ganti foto/video profil</span>
      <input type="file" id="profile-avatar-input" accept="image/*,video/*" />
    </div>

    <label class="field-label">Nama</label>
    <input type="text" id="profile-name-input" placeholder="mis. Aiko" />

    <label class="field-label">Kepribadian</label>
    <div id="personality-presets">
      <button class="preset-btn" data-preset="ramah">😊 Ramah</button>
      <button class="preset-btn" data-preset="ceria">✨ Ceria</button>
      <button class="preset-btn" data-preset="serius">🎯 Serius</button>
      <button class="preset-btn" data-preset="puitis">🍃 Puitis</button>
    </div>
    <textarea id="profile-personality-input" rows="4" placeholder="Deskripsikan kepribadiannya..."></textarea>

    <label class="field-label">Galeri (3 slot)</label>
    <div id="gallery-slots">
      <div class="gallery-slot" data-index="0">+</div>
      <div class="gallery-slot" data-index="1">+</div>
      <div class="gallery-slot" data-index="2">+</div>
    </div>
    <p class="gallery-hint">Tap slot buat upload gambar dari HP. Tap gambar yang udah ada buat jadiin avatar.</p>
    <input type="file" id="gallery-file-input" accept="image/*" />

    <label class="field-label">Tampilan</label>
    <div id="theme-toggle-row">
      <span style="font-size:14px;">Mode gelap</span>
      <label class="switch">
        <input type="checkbox" id="theme-toggle" />
        <span class="switch-slider"></span>
      </label>
    </div>

    <button id="save-profile-btn">Simpan</button>
  </div>
</div>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar-overlay"></div>
<div id="sidebar">
  <div id="sidebar-header">
    <button id="new-chat-btn">+ Percakapan baru</button>
  </div>
  <div id="sidebar-list"></div>
  <div id="sidebar-footer">
    <button id="export-btn">⬇ Export</button>
    <button id="import-btn">⬆ Import</button>
    <input type="file" id="import-file-input" accept=".json,application/json" />
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div id="app-header">
    <span class="menu-icon" id="menu-btn">☰</span>
    <div id="header-avatar-btn"><span id="header-avatar-emoji">🤖</span></div>
    <span class="title" id="header-title">Aiko AI</span>
    <span id="home-btn">🏠</span>
  </div>

  <!-- ===== HERO / LANDING ===== -->
  <div id="hero">
    <div id="hero-icon-ring">
      <div id="hero-icon"><span id="hero-icon-emoji">🤖</span></div>
    </div>
    <h1 id="hero-title">Aiko AI</h1>
    <p class="tagline">Your Personal Assistant</p>

    <div id="topic-chips">
      <button class="chip" data-topic="Coding">💻 Coding</button>
      <button class="chip" data-topic="Linux">🐧 Linux</button>
      <button class="chip" data-topic="Android">📱 Android</button>
      <button class="chip" data-topic="AI">🤖 AI</button>
    </div>
  </div>

  <!-- ===== CHAT VIEW ===== -->
  <div id="chat-view">
    <div id="messages"></div>
    <div id="typing-indicator">
      <div class="msg-avatar" id="typing-avatar"><span>🤖</span></div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ===== INPUT BAR ===== -->
  <div id="input-bar">
    <div id="input-wrap">
      <button id="mic-btn">🎤</button>
      <textarea id="message-input" rows="1" placeholder="Tanyakan apa saja..."></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<script>
  // ================= HELPERS =================
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  // ================= PROFILE (localStorage) =================
  const PROFILE_KEY = "aiko_profile";
  const defaultProfile = {
    name: "Aiko",
    avatarDataUrl: null,
    avatarType: "image",
    personality: "Kamu ramah, hangat, santai, dan suka membantu.",
    gallery: [null, null, null],
    theme: "dark",
  };
  let profile = { ...defaultProfile };
  try {
    const saved = JSON.parse(localStorage.getItem(PROFILE_KEY));
    if (saved) profile = { ...defaultProfile, ...saved };
  } catch (e) { /* ignore */ }

  function saveProfile() {
    try {
      localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
    } catch (e) {
      console.warn("Gagal simpan profil (mungkin gambar terlalu besar):", e);
    }
  }

  function applyTheme() {
    document.documentElement.setAttribute("data-theme", profile.theme);
  }

  function renderAvatarMarkup(dataUrl, type) {
    if (!dataUrl) return `<span>🤖</span>`;
    if (type === "video") {
      return `<video src="${dataUrl}" autoplay muted loop playsinline></video>`;
    }
    return `<img src="${dataUrl}" alt="Avatar" />`;
  }

  function applyProfileToUI() {
    document.getElementById("header-title").textContent = profile.name;
    document.getElementById("hero-title").textContent = profile.name;

    [headerAvatarBtn, heroIconEl].forEach((wrap) => {
      wrap.innerHTML = renderAvatarMarkup(profile.avatarDataUrl, profile.avatarType);
    });

    applyTheme();
    renderMessages();
  }

  const PRESETS = {
    ramah: "Kamu ramah, hangat, santai, dan suka membantu. Kamu selalu mendengarkan dengan baik.",
    ceria: "Kamu ceria, energik, suka bercanda, dan pakai emoji sesekali biar seru.",
    serius: "Kamu profesional, to-the-point, dan fokus kasih jawaban yang jelas dan efisien.",
    puitis: "Kamu lembut, reflektif, dan suka menjelaskan sesuatu dengan bahasa yang puitis dan hangat.",
  };

  // ================= STATE =================
  let messages = [];
  let loading = false;
  let chatStarted = false;
  let activeConversationId = null;
  let editingMessageId = null;

  // ================= ELEMENTS =================
  const heroEl = document.getElementById("hero");
  const chatViewEl = document.getElementById("chat-view");
  const messagesEl = document.getElementById("messages");
  const typingEl = document.getElementById("typing-indicator");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const micBtn = document.getElementById("mic-btn");
  const heroIconEl = document.getElementById("hero-icon");
  const headerAvatarBtn = document.getElementById("header-avatar-btn");
  const sidebarEl = document.getElementById("sidebar");
  const sidebarOverlayEl = document.getElementById("sidebar-overlay");
  const sidebarListEl = document.getElementById("sidebar-list");
  const menuBtn = document.getElementById("menu-btn");
  const newChatBtn = document.getElementById("new-chat-btn");
  const homeBtn = document.getElementById("home-btn");
  const exportBtn = document.getElementById("export-btn");
  const importBtn = document.getElementById("import-btn");
  const importFileInput = document.getElementById("import-file-input");

  const profilePanelEl = document.getElementById("profile-panel");
  const profileOverlayEl = document.getElementById("profile-overlay");
  const profileCloseBtn = document.getElementById("profile-close");
  const profileAvatarEl = document.getElementById("profile-avatar");
  const profileAvatarInput = document.getElementById("profile-avatar-input");
  const profileNameInput = document.getElementById("profile-name-input");
  const profilePersonalityInput = document.getElementById("profile-personality-input");
  const gallerySlotsEl = document.getElementById("gallery-slots");
  const galleryFileInput = document.getElementById("gallery-file-input");
  const themeToggle = document.getElementById("theme-toggle");
  const saveProfileBtn = document.getElementById("save-profile-btn");

  // ================= PROFILE PANEL LOGIC =================
  function openProfilePanel() {
    profileNameInput.value = profile.name;
    profilePersonalityInput.value = profile.personality;
    themeToggle.checked = profile.theme === "dark";
    renderProfileAvatarPreview();
    renderGallerySlots();
    profilePanelEl.classList.add("open");
    profileOverlayEl.classList.add("open");
  }
  function closeProfilePanel() {
    profilePanelEl.classList.remove("open");
    profileOverlayEl.classList.remove("open");
  }
  function renderProfileAvatarPreview() {
    profileAvatarEl.innerHTML = renderAvatarMarkup(profile.avatarDataUrl, profile.avatarType);
  }
  function renderGallerySlots() {
    gallerySlotsEl.querySelectorAll(".gallery-slot").forEach((slot, i) => {
      const img = profile.gallery[i];
      slot.innerHTML = img ? `<img src="${img}" alt="Galeri ${i + 1}" /><button class="slot-remove" data-remove="${i}">✕</button>` : "+";
    });
  }

  headerAvatarBtn.addEventListener("click", openProfilePanel);
  document.getElementById("hero-icon-ring").addEventListener("click", openProfilePanel);
  profileCloseBtn.addEventListener("click", closeProfilePanel);
  profileOverlayEl.addEventListener("click", closeProfilePanel);

  profileAvatarEl.addEventListener("click", () => profileAvatarInput.click());
  profileAvatarInput.addEventListener("change", () => {
    const file = profileAvatarInput.files[0];
    if (!file) return;
    const isImage = file.type.startsWith("image/");
    const isVideo = file.type.startsWith("video/");
    if (!isImage && !isVideo) return;
    if (isVideo && file.size > 4 * 1024 * 1024) {
      alert("Video agak besar (>4MB), mungkin gagal tersimpan permanen di HP. Tetap dipakai untuk sesi ini ya.");
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      profile.avatarDataUrl = e.target.result;
      profile.avatarType = isVideo ? "video" : "image";
      renderProfileAvatarPreview();
    };
    reader.readAsDataURL(file);
  });

  document.querySelectorAll(".preset-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      profilePersonalityInput.value = PRESETS[btn.dataset.preset];
    });
  });

  let activeGallerySlotIndex = null;
  gallerySlotsEl.addEventListener("click", (e) => {
    const removeIdx = e.target.dataset.remove;
    if (removeIdx !== undefined) {
      profile.gallery[Number(removeIdx)] = null;
      renderGallerySlots();
      return;
    }
    const slot = e.target.closest(".gallery-slot");
    if (!slot) return;
    const idx = Number(slot.dataset.index);
    if (profile.gallery[idx]) {
      // sudah ada gambar -> jadikan avatar
      profile.avatarDataUrl = profile.gallery[idx];
      profile.avatarType = "image";
      renderProfileAvatarPreview();
    } else {
      activeGallerySlotIndex = idx;
      galleryFileInput.click();
    }
  });
  galleryFileInput.addEventListener("change", () => {
    const file = galleryFileInput.files[0];
    if (!file || !file.type.startsWith("image/") || activeGallerySlotIndex === null) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      profile.gallery[activeGallerySlotIndex] = e.target.result;
      renderGallerySlots();
    };
    reader.readAsDataURL(file);
  });

  themeToggle.addEventListener("change", () => {
    profile.theme = themeToggle.checked ? "dark" : "light";
    applyTheme();
  });

  saveProfileBtn.addEventListener("click", () => {
    profile.name = profileNameInput.value.trim() || "Aiko";
    profile.personality = profilePersonalityInput.value.trim() || defaultProfile.personality;
    saveProfile();
    applyProfileToUI();
    closeProfilePanel();
  });

  applyProfileToUI();

  // ================= RIWAYAT PERCAKAPAN (localStorage) =================
  const CONVERSATIONS_KEY = "aiko_conversations";
  let conversations = [];
  try {
    conversations = JSON.parse(localStorage.getItem(CONVERSATIONS_KEY)) || [];
  } catch (e) { conversations = []; }

  function saveConversations() {
    try {
      localStorage.setItem(CONVERSATIONS_KEY, JSON.stringify(conversations));
    } catch (e) {
      console.warn("Gagal simpan riwayat chat:", e);
    }
  }

  function conversationTitle(conv) {
    if (conv.customTitle && conv.title) return conv.title;
    const firstUserMsg = conv.messages.find((m) => m.role === "user");
    if (!firstUserMsg) return "Percakapan baru";
    return firstUserMsg.content.length > 34 ? firstUserMsg.content.slice(0, 34) + "…" : firstUserMsg.content;
  }

  function renderSidebarList() {
    sidebarListEl.innerHTML = "";
    if (conversations.length === 0) {
      const empty = document.createElement("div");
      empty.className = "conv-empty";
      empty.textContent = "Belum ada percakapan.";
      sidebarListEl.appendChild(empty);
      return;
    }
    const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
    sorted.forEach((conv) => {
      const item = document.createElement("div");
      item.className = "conv-item" + (conv.id === activeConversationId ? " active" : "");

      const titleEl = document.createElement("span");
      titleEl.className = "conv-title";
      titleEl.textContent = conversationTitle(conv);
      item.appendChild(titleEl);

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "✎";
      renameBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const input = document.createElement("input");
        input.className = "conv-title-input";
        input.value = conversationTitle(conv);
        titleEl.replaceWith(input);
        input.focus();
        input.select();
        const commit = () => {
          conv.title = input.value.trim() || conversationTitle(conv);
          conv.customTitle = true;
          saveConversations();
          renderSidebarList();
        };
        input.addEventListener("blur", commit);
        input.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") { ev.preventDefault(); input.blur(); }
        });
      });
      item.appendChild(renameBtn);

      const delBtn = document.createElement("button");
      delBtn.textContent = "✕";
      delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        conversations = conversations.filter((c) => c.id !== conv.id);
        saveConversations();
        if (conv.id === activeConversationId) goToHero();
        renderSidebarList();
      });
      item.appendChild(delBtn);

      item.addEventListener("click", () => openConversation(conv.id));
      sidebarListEl.appendChild(item);
    });
  }

  function openConversation(id) {
    const conv = conversations.find((c) => c.id === id);
    if (!conv) return;
    activeConversationId = id;
    messages = conv.messages;
    chatStarted = true;
    heroEl.style.display = "none";
    chatViewEl.style.display = "flex";
    homeBtn.style.display = "inline";
    renderMessages();
    renderSidebarList();
    closeSidebar();
  }

  function goToHero() {
    activeConversationId = null;
    messages = [];
    chatStarted = false;
    editingMessageId = null;
    heroEl.style.display = "flex";
    chatViewEl.style.display = "none";
    homeBtn.style.display = "none";
    inputEl.value = "";
    autoResize();
    checkSendEnabled();
    renderSidebarList();
    closeSidebar();
  }

  function openSidebar() { sidebarEl.classList.add("open"); sidebarOverlayEl.classList.add("open"); }
  function closeSidebar() { sidebarEl.classList.remove("open"); sidebarOverlayEl.classList.remove("open"); }

  menuBtn.addEventListener("click", openSidebar);
  sidebarOverlayEl.addEventListener("click", closeSidebar);
  newChatBtn.addEventListener("click", goToHero);
  homeBtn.addEventListener("click", goToHero);

  // ---------- EXPORT / IMPORT ----------
  exportBtn.addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(conversations, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "aiko-chat-export.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  importBtn.addEventListener("click", () => importFileInput.click());
  importFileInput.addEventListener("change", () => {
    const file = importFileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error("format salah");
        const existingIds = new Set(conversations.map((c) => c.id));
        imported.forEach((conv) => {
          if (!conv.id || existingIds.has(conv.id)) conv.id = uid();
          conversations.push(conv);
        });
        saveConversations();
        renderSidebarList();
        alert("Import berhasil! " + imported.length + " percakapan ditambahkan.");
      } catch (err) {
        alert("Gagal import: file JSON tidak valid.");
      }
    };
    reader.readAsText(file);
  });

  renderSidebarList();

  // ================= HERO CHIP CLICK =================
  document.querySelectorAll(".chip").forEach((chip) => {
    chip.addEventListener("click", () => {
      inputEl.value = `Ceritain tentang ${chip.dataset.topic} dong`;
      checkSendEnabled();
      inputEl.focus();
    });
  });

  // ================= INPUT HANDLING =================
  inputEl.addEventListener("input", () => { autoResize(); checkSendEnabled(); });
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener("click", sendMessage);

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  }
  function checkSendEnabled() {
    sendBtn.classList.toggle("enabled", inputEl.value.trim().length > 0 && !loading);
  }

  // ================= VOICE INPUT =================
  let recognition = null;
  const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognitionCtor) {
    recognition = new SpeechRecognitionCtor();
    recognition.lang = "id-ID";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      inputEl.value = (inputEl.value ? inputEl.value + " " : "") + transcript;
      autoResize();
      checkSendEnabled();
    };
    recognition.onend = () => micBtn.classList.remove("listening");
    recognition.onerror = () => micBtn.classList.remove("listening");
  } else {
    micBtn.style.display = "none";
  }
  micBtn.addEventListener("click", () => {
    if (!recognition) return;
    if (micBtn.classList.contains("listening")) {
      recognition.stop();
    } else {
      try {
        recognition.start();
        micBtn.classList.add("listening");
      } catch (e) { /* sudah jalan */ }
    }
  });

  // ================= SWITCH TO CHAT VIEW =================
  function enterChatView() {
    if (chatStarted) return;
    chatStarted = true;
    activeConversationId = uid();
    heroEl.style.display = "none";
    chatViewEl.style.display = "flex";
    homeBtn.style.display = "inline";
  }

  // ================= MESSAGE ACTIONS =================
  function copyMessage(id) {
    const m = messages.find((mm) => mm.id === id);
    if (!m) return;
    navigator.clipboard.writeText(m.content).then(() => {
      const btn = messagesEl.querySelector(`[data-copy-id="${id}"]`);
      if (btn) {
        const original = btn.textContent;
        btn.textContent = "✓ Disalin";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = original; btn.classList.remove("copied"); }, 1500);
      }
    });
  }
  function deleteMessage(id) {
    messages = messages.filter((m) => m.id !== id);
    renderMessages();
    persistCurrentConversation();
  }
  function startEditMessage(id) { editingMessageId = id; renderMessages(); }
  function cancelEditMessage() { editingMessageId = null; renderMessages(); }
  function saveEditMessage(id, newText) {
    const m = messages.find((mm) => mm.id === id);
    if (m && newText.trim()) m.content = newText.trim();
    editingMessageId = null;
    renderMessages();
    persistCurrentConversation();
  }

  // ================= RENDER MESSAGES =================
  function renderMessages() {
    messagesEl.innerHTML = "";
    messages.forEach((m) => {
      const block = document.createElement("div");
      block.className = "msg-block";

      const row = document.createElement("div");
      row.className = "msg-row " + m.role;
      row.dataset.msgId = m.id;

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      if (m.role === "assistant" && profile.avatarDataUrl) {
        avatar.innerHTML = `<img src="${profile.avatarDataUrl}" alt="Avatar" />`;
      } else {
        avatar.textContent = m.role === "assistant" ? "🤖" : "🗿";
      }
      row.appendChild(avatar);

      if (editingMessageId === m.id) {
        const textarea = document.createElement("textarea");
        textarea.className = "msg-edit-textarea";
        textarea.value = m.content;
        textarea.rows = 3;
        row.appendChild(textarea);
        block.appendChild(row);

        const editActions = document.createElement("div");
        editActions.className = "msg-actions";
        editActions.style.justifyContent = m.role === "user" ? "flex-end" : "flex-start";
        editActions.style.paddingRight = m.role === "user" ? "34px" : "0";
        editActions.style.paddingLeft = m.role === "assistant" ? "34px" : "0";

        const saveBtn = document.createElement("button");
        saveBtn.className = "msg-action-btn";
        saveBtn.textContent = "Simpan";
        saveBtn.addEventListener("click", () => saveEditMessage(m.id, textarea.value));
        const cancelBtn = document.createElement("button");
        cancelBtn.className = "msg-action-btn";
        cancelBtn.textContent = "Batal";
        cancelBtn.addEventListener("click", cancelEditMessage);
        editActions.appendChild(saveBtn);
        editActions.appendChild(cancelBtn);
        block.appendChild(editActions);
        messagesEl.appendChild(block);
        return;
      }

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble " + m.role;
      bubble.textContent = m.content;
      row.appendChild(bubble);
      block.appendChild(row);

      const actions = document.createElement("div");
      actions.className = "msg-actions";
      actions.style.justifyContent = m.role === "user" ? "flex-end" : "flex-start";
      actions.style.paddingRight = m.role === "user" ? "34px" : "0";
      actions.style.paddingLeft = m.role === "assistant" ? "34px" : "0";

      if (m.role === "assistant" && !m.streaming) {
        const copyBtn = document.createElement("button");
        copyBtn.className = "msg-action-btn";
        copyBtn.textContent = "📋 Salin";
        copyBtn.dataset.copyId = m.id;
        copyBtn.addEventListener("click", () => copyMessage(m.id));
        actions.appendChild(copyBtn);
      }
      if (m.role === "user") {
        const editBtn = document.createElement("button");
        editBtn.className = "msg-action-btn";
        editBtn.textContent = "✎ Edit";
        editBtn.addEventListener("click", () => startEditMessage(m.id));
        actions.appendChild(editBtn);
      }
      if (!m.streaming) {
        const delBtn = document.createElement("button");
        delBtn.className = "msg-action-btn";
        delBtn.textContent = "🗑";
        delBtn.addEventListener("click", () => deleteMessage(m.id));
        actions.appendChild(delBtn);
      }
      block.appendChild(actions);
      messagesEl.appendChild(block);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function updateStreamingBubble(id, text) {
    const row = messagesEl.querySelector(`.msg-row[data-msg-id="${id}"]`);
    if (row) {
      const bubble = row.querySelector(".msg-bubble");
      if (bubble) {
        bubble.textContent = text;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }
    }
    renderMessages();
  }

  // ================= SEND MESSAGE (STREAMING) =================
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || loading) return;

    enterChatView();

    messages.push({ role: "user", content: text, id: uid() });
    inputEl.value = "";
    autoResize();
    loading = true;
    checkSendEnabled();
    renderMessages();

    const assistantMsg = { role: "assistant", content: "", id: uid(), streaming: true };
    messages.push(assistantMsg);
    typingEl.classList.add("show");
    renderMessages();

    const SYSTEM_PROMPT = `Kamu berperan sebagai karakter bernama "${profile.name}". Kepribadianmu: ${profile.personality}. Balas selalu dalam Bahasa Indonesia dengan gaya ngobrol santai dan natural, bukan seperti asisten formal kaku. Jangan menyebut dirimu sebagai AI kecuali ditanya langsung.`;

    // Groq API - gratis, cepat, butuh API key dari console.groq.com
    const GROQ_API_KEY = "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";
    const GROQ_MODEL = "llama-3.3-70b-versatile";

    try {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + GROQ_API_KEY,
        },
        body: JSON.stringify({
          model: GROQ_MODEL,
          stream: true,
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            ...messages.filter((m) => !m.error && m.id !== assistantMsg.id).map((m) => ({ role: m.role, content: m.content })),
          ],
        }),
      });

      if (response.status === 429) {
        assistantMsg.content = "Lagi kebanyakan chat nih, tunggu sebentar ya (kena rate limit).";
        assistantMsg.error = true;
      } else if (!response.ok || !response.body) {
        throw new Error("Response tidak valid");
      } else {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let firstChunk = true;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith("data:")) continue;
            const dataStr = trimmed.slice(5).trim();
            if (dataStr === "[DONE]") continue;
            try {
              const json = JSON.parse(dataStr);
              const delta = json.choices && json.choices[0] && json.choices[0].delta ? json.choices[0].delta.content : "";
              if (delta) {
                if (firstChunk) { typingEl.classList.remove("show"); firstChunk = false; }
                assistantMsg.content += delta;
                updateStreamingBubble(assistantMsg.id, assistantMsg.content);
              }
            } catch (e) { /* baris tidak lengkap, abaikan */ }
          }
        }

        if (!assistantMsg.content) {
          assistantMsg.content = "Maaf, aku belum bisa jawab itu.";
          assistantMsg.error = true;
        }
      }
    } catch (err) {
      assistantMsg.content = "Gagal konek ke server AI. Cek koneksi internet ya.";
      assistantMsg.error = true;
    } finally {
      assistantMsg.streaming = false;
      loading = false;
      typingEl.classList.remove("show");
      checkSendEnabled();
      renderMessages();
      persistCurrentConversation();
    }
  }

  function persistCurrentConversation() {
    if (!activeConversationId) return;
    const existing = conversations.find((c) => c.id === activeConversationId);
    if (existing) {
      existing.messages = messages;
      existing.updatedAt = Date.now();
    } else {
      conversations.push({ id: activeConversationId, messages: messages, updatedAt: Date.now(), customTitle: false, title: "" });
    }
    saveConversations();
    renderSidebarList();
  }
</script>

</body>
</html>
